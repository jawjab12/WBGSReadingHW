<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discuss</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg: #080808;
    --bg2: #111;
    --bg3: #161616;
    --border: #222;
    --border2: #2a2a2a;
    --text: #e8e8e4;
    --text2: #b0b0ac;
    --text3: #666;
    --text4: #444;
    --btn-bg: #e8e8e4;
    --btn-text: #080808;
    --hero-grad: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1a1a 0%, #080808 70%);
    --divider: linear-gradient(90deg, transparent, #222, transparent);
    --settings-bg: #0e0e0e;
    --input-bg: #111;
  }
  :root[data-theme="light"] {
    --bg: #f5f5f0;
    --bg2: #ffffff;
    --bg3: #eeeeea;
    --border: #ddd;
    --border2: #ccc;
    --text: #111;
    --text2: #444;
    --text3: #888;
    --text4: #bbb;
    --btn-bg: #111;
    --btn-text: #f5f5f0;
    --hero-grad: radial-gradient(ellipse 80% 60% at 50% 0%, #e8e8e3 0%, #f5f5f0 70%);
    --divider: linear-gradient(90deg, transparent, #ccc, transparent);
    --settings-bg: #ebebeb;
    --input-bg: #fff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  .topbar {
    position: fixed;
    top: 0; right: 0;
    padding: 1rem 1.5rem;
    z-index: 100;
  }

  .settings-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text3);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .settings-btn:hover { border-color: var(--border2); color: var(--text2); }

  .settings-panel {
    position: fixed;
    top: 0; right: -360px;
    width: 320px;
    height: 100vh;
    background: var(--settings-bg);
    border-left: 1px solid var(--border);
    z-index: 200;
    transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .settings-panel.open { right: 0; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 199;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.active { opacity: 1; pointer-events: all; }

  .settings-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .settings-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
  }

  .setting-group label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 0.75rem;
  }

  .theme-toggle {
    display: flex;
    gap: 8px;
  }

  .theme-opt {
    flex: 1;
    padding: 0.6rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg2);
    color: var(--text2);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .theme-opt.active {
    border-color: var(--text2);
    color: var(--text);
  }

  .setting-group textarea,
  .setting-group input[type="text"] {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .setting-group textarea:focus,
  .setting-group input[type="text"]:focus { border-color: var(--border2); }

  .setting-group textarea { min-height: 140px; }

  .save-btn {
    width: 100%;
    padding: 0.75rem;
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .save-btn:hover { opacity: 0.85; }

  .saved-notice {
    font-size: 0.75rem;
    color: var(--text3);
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .saved-notice.show { opacity: 1; }

  .hint {
    font-size: 0.75rem;
    color: var(--text4);
    margin-top: 0.4rem;
    line-height: 1.5;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
    background: var(--hero-grad);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 0.5rem;
    text-align: center;
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .input-area { width: 100%; max-width: 720px; }

  textarea#extractInput {
    width: 100%;
    min-height: 200px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s;
  }
  textarea#extractInput::placeholder { color: var(--text4); }
  textarea#extractInput:focus { border-color: var(--border2); }

  .btn {
    margin-top: 1rem;
    width: 100%;
    padding: 1rem;
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .error { margin-top: 1rem; color: #e05a5a; font-size: 0.85rem; text-align: center; display: none; }

  .results-section {
    width: 100%; max-width: 720px;
    margin: 0 auto;
    padding: 0 2rem 6rem;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .results-section.visible { opacity: 1; transform: translateY(0); }

  .divider { width: 100%; height: 1px; background: var(--divider); margin: 3rem 0; }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 1.25rem;
  }

  .summary-block { margin-bottom: 3rem; }

  .summary-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }

  .summary-bullets li {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--text2);
    padding-left: 1.2rem;
    position: relative;
  }
  .summary-bullets li::before { content: '—'; position: absolute; left: 0; color: var(--text4); }

  .discussion-grid { display: flex; flex-direction: column; }

  .dp-item {
    padding: 1.1rem 0;
    border-bottom: 1px solid var(--bg3);
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    display: flex;
    gap: 1.25rem;
    align-items: flex-start;
  }
  .dp-item.visible { opacity: 1; transform: translateY(0); }

  .dp-num { font-family: 'Syne', sans-serif; font-size: 0.7rem; color: var(--text4); min-width: 24px; padding-top: 3px; }

  .dp-text { font-size: 0.9rem; line-height: 1.65; color: var(--text2); }

  .loading-dots { display: none; gap: 6px; justify-content: center; margin-top: 1.5rem; }
  .loading-dots span {
    width: 6px; height: 6px;
    background: var(--text4);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="settings-btn" onclick="openSettings()" title="Settings">⚙</button>
</div>

<div class="overlay" id="overlay" onclick="closeSettings()"></div>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h2>Settings</h2>
    <button class="close-btn" onclick="closeSettings()">✕</button>
  </div>

  <div class="setting-group">
    <label>Theme</label>
    <div class="theme-toggle">
      <button class="theme-opt" id="darkOpt" onclick="setTheme('dark')">Dark</button>
      <button class="theme-opt" id="lightOpt" onclick="setTheme('light')">Light</button>
    </div>
  </div>

  <div class="setting-group">
    <label>Gemini API Key</label>
    <input type="text" id="apiKeyInput" placeholder="AIza...">
    <p class="hint">Get a free key at aistudio.google.com. Saved in your browser only.</p>
  </div>

  <div class="setting-group">
    <label>Custom AI Prompt</label>
    <textarea id="promptInput">You are analysing a text extract. Return ONLY valid JSON, no markdown, no backticks, no explanation.

Return this exact structure:
{
  "summary": ["bullet 1", "bullet 2", "bullet 3", "bullet 4", "bullet 5"],
  "discussion_points": ["point 1", ... "point 10"]
}

Rules:
- Summary: 4-5 concise bullet points
- Discussion points: exactly 10, punchy, 1-2 sentences max, no prefixes

Extract:
{{EXTRACT}}</textarea>
    <p class="hint">Use {{EXTRACT}} where you want the pasted text to appear.</p>
  </div>

  <button class="save-btn" onclick="saveSettings()">Save Settings</button>
  <p class="saved-notice" id="savedNotice">Saved.</p>
</div>

<div class="hero">
  <h1>Nobody Likes reading HW;</h1>
  <p class="subtitle">Lets save you some time</p>
  <div class="input-area">
    <textarea id="extractInput" placeholder="Paste your extract here..."></textarea>
    <div class="loading-dots" id="loadingDots"><span></span><span></span><span></span></div>
    <div class="error" id="errorMsg">Something went wrong. Check your API key in settings and try again.</div>
    <button class="btn" id="generateBtn" onclick="generate()">Generate Discussion Points</button>
  </div>
</div>

<div class="results-section" id="results">
  <div class="divider"></div>
  <div class="summary-block">
    <p class="section-label">Summary</p>
    <ul class="summary-bullets" id="summaryList"></ul>
  </div>
  <div>
    <p class="section-label">Discussion Points</p>
    <div class="discussion-grid" id="dpGrid"></div>
  </div>
</div>

<script>
const DEFAULT_PROMPT = `You are analysing a text extract. Return ONLY valid JSON, no markdown, no backticks, no explanation.

Return this exact structure:
{
  "summary": ["bullet 1", "bullet 2", "bullet 3", "bullet 4", "bullet 5"],
  "discussion_points": ["point 1", "point 2", "point 3", "point 4", "point 5", "point 6", "point 7", "point 8", "point 9", "point 10"]
}

Rules:
- Summary: 4-5 concise bullet points covering the key content
- Discussion points: exactly 10, punchy, no fluff, 1-2 sentences max each, no prefixes or numbering

Extract:
{{EXTRACT}}`;

const DEFAULT_API_KEY = 'YOUR_GEMINI_API_KEY_HERE';

function loadSettings() {
  const theme = localStorage.getItem('discuss_theme') || 'dark';
  const apiKey = localStorage.getItem('discuss_apikey') || DEFAULT_API_KEY;
  const prompt = localStorage.getItem('discuss_prompt') || DEFAULT_PROMPT;
  setTheme(theme, true);
  document.getElementById('apiKeyInput').value = apiKey;
  document.getElementById('promptInput').value = prompt;
}

function setTheme(t, silent) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('darkOpt').classList.toggle('active', t === 'dark');
  document.getElementById('lightOpt').classList.toggle('active', t === 'light');
  if (!silent) localStorage.setItem('discuss_theme', t);
}

function saveSettings() {
  localStorage.setItem('discuss_apikey', document.getElementById('apiKeyInput').value.trim());
  localStorage.setItem('discuss_prompt', document.getElementById('promptInput').value);
  const notice = document.getElementById('savedNotice');
  notice.classList.add('show');
  setTimeout(() => notice.classList.remove('show'), 2000);
}

function openSettings() {
  document.getElementById('settingsPanel').classList.add('open');
  document.getElementById('overlay').classList.add('active');
}

function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
}

async function generate() {
  const extract = document.getElementById('extractInput').value.trim();
  if (!extract) return;

  const apiKey = localStorage.getItem('discuss_apikey') || DEFAULT_API_KEY;
  const promptTemplate = localStorage.getItem('discuss_prompt') || DEFAULT_PROMPT;
  const prompt = promptTemplate.replace('{{EXTRACT}}', extract);

  const btn = document.getElementById('generateBtn');
  const dots = document.getElementById('loadingDots');
  const errMsg = document.getElementById('errorMsg');
  const results = document.getElementById('results');

  btn.disabled = true;
  dots.style.display = 'flex';
  errMsg.style.display = 'none';
  results.classList.remove('visible');

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.7, maxOutputTokens: 1500 }
        })
      }
    );
    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    renderResults(parsed.summary, parsed.discussion_points);
  } catch(e) {
    errMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    dots.style.display = 'none';
  }
}

function renderResults(summary, points) {
  const summaryList = document.getElementById('summaryList');
  const dpGrid = document.getElementById('dpGrid');
  summaryList.innerHTML = '';
  dpGrid.innerHTML = '';

  summary.forEach(s => {
    const li = document.createElement('li');
    li.textContent = s;
    summaryList.appendChild(li);
  });

  points.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'dp-item';
    const num = i + 1 < 10 ? `0${i+1}` : `${i+1}`;
    div.innerHTML = `<span class="dp-num">${num}</span><span class="dp-text">${p}</span>`;
    dpGrid.appendChild(div);
  });

  const results = document.getElementById('results');
  results.classList.add('visible');
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });

  setTimeout(() => {
    document.querySelectorAll('.dp-item').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 80);
    });
  }, 400);
}

loadSettings();
</script>
</body>
</html>
