<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discuss</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    color: #e8e8e4;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
    position: relative;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1a1a 0%, #080808 70%);
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(circle at 20% 50%, rgba(255,255,255,0.015) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.01) 0%, transparent 40%);
    pointer-events: none;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #f0f0ec;
    margin-bottom: 0.5rem;
    text-align: center;
  }

  .subtitle {
    font-size: 0.95rem;
    color: #666;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    text-align: center;
  }

  .input-area {
    width: 100%;
    max-width: 720px;
    position: relative;
  }

  textarea {
    width: 100%;
    min-height: 200px;
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 1.25rem;
    color: #e0e0dc;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s;
  }

  textarea::placeholder { color: #444; }
  textarea:focus { border-color: #444; }

  .btn {
    margin-top: 1rem;
    width: 100%;
    padding: 1rem;
    background: #e8e8e4;
    color: #080808;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .error {
    margin-top: 1rem;
    color: #e05a5a;
    font-size: 0.85rem;
    text-align: center;
    display: none;
  }

  .results-section {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 2rem 6rem;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }

  .results-section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #222, transparent);
    margin: 3rem 0;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 1.25rem;
  }

  .summary-block {
    margin-bottom: 3rem;
  }

  .summary-bullets {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .summary-bullets li {
    font-size: 0.9rem;
    line-height: 1.6;
    color: #b0b0ac;
    padding-left: 1.2rem;
    position: relative;
  }

  .summary-bullets li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: #444;
  }

  .discussion-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .dp-item {
    padding: 1.1rem 0;
    border-bottom: 1px solid #161616;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    display: flex;
    gap: 1.25rem;
    align-items: flex-start;
  }

  .dp-item.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .dp-num {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    color: #333;
    min-width: 24px;
    padding-top: 3px;
    letter-spacing: 0.05em;
  }

  .dp-text {
    font-size: 0.9rem;
    line-height: 1.65;
    color: #c8c8c4;
  }

  .loading-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 1.5rem;
    display: none;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    background: #444;
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>Discuss.</h1>
  <p class="subtitle">Extract · Analyse · Discuss</p>

  <div class="input-area">
    <textarea id="extractInput" placeholder="Paste your extract here..."></textarea>
    <div class="loading-dots" id="loadingDots">
      <span></span><span></span><span></span>
    </div>
    <div class="error" id="errorMsg">Something went wrong. Check your extract and try again.</div>
    <button class="btn" id="generateBtn" onclick="generate()">Generate Discussion Points</button>
  </div>
</div>

<div class="results-section" id="results">
  <div class="divider"></div>

  <div class="summary-block">
    <p class="section-label">Summary</p>
    <ul class="summary-bullets" id="summaryList"></ul>
  </div>

  <div>
    <p class="section-label">Discussion Points</p>
    <div class="discussion-grid" id="dpGrid"></div>
  </div>
</div>

<script>
const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY_HERE';

async function generate() {
  const extract = document.getElementById('extractInput').value.trim();
  if (!extract) return;

  const btn = document.getElementById('generateBtn');
  const dots = document.getElementById('loadingDots');
  const errMsg = document.getElementById('errorMsg');
  const results = document.getElementById('results');

  btn.disabled = true;
  dots.style.display = 'flex';
  errMsg.style.display = 'none';
  results.classList.remove('visible');

  const prompt = `You are analysing a text extract. Return ONLY valid JSON, no markdown, no backticks, no explanation.

Return this exact structure:
{
  "summary": ["bullet point 1", "bullet point 2", "bullet point 3", "bullet point 4", "bullet point 5"],
  "discussion_points": ["point 1", "point 2", "point 3", "point 4", "point 5", "point 6", "point 7", "point 8", "point 9", "point 10"]
}

Rules:
- Summary: 4-5 concise bullet points covering the key content
- Discussion points: exactly 10, punchy, no fluff, 1-2 sentences max each. Frame as questions or provocations that spark genuine discussion.
- No bullet symbols, numbers, or prefixes in the strings themselves

Extract:
${extract}`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.7, maxOutputTokens: 1500 }
        })
      }
    );

    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    renderResults(parsed.summary, parsed.discussion_points);
  } catch (e) {
    errMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    dots.style.display = 'none';
  }
}

function renderResults(summary, points) {
  const summaryList = document.getElementById('summaryList');
  const dpGrid = document.getElementById('dpGrid');

  summaryList.innerHTML = '';
  dpGrid.innerHTML = '';

  summary.forEach(s => {
    const li = document.createElement('li');
    li.textContent = s;
    summaryList.appendChild(li);
  });

  points.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'dp-item';
    div.innerHTML = `<span class="dp-num">0${i + 1}</span><span class="dp-text">${p}</span>`;
    dpGrid.appendChild(div);
  });

  const results = document.getElementById('results');
  results.classList.add('visible');

  results.scrollIntoView({ behavior: 'smooth', block: 'start' });

  setTimeout(() => {
    document.querySelectorAll('.dp-item').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 80);
    });
  }, 400);
}
</script>
</body>
</html>
